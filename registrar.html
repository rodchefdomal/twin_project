<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Manutenção</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1410; color: #ffffff; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #121e17; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #1f3328; }
        h1 { text-align: center; font-size: 26px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #9cb3a5; font-size: 14px; }
        
        /* Ajuste para inputs, textareas e files */
        input[type="text"], input[type="date"], input[type="number"], textarea, input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #1f3328; 
            background-color: #182b20; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px; 
            font-family: inherit; /* Mantém a fonte no textarea */
        }
        
        input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, textarea:focus { 
            outline: none; 
            border-color: #008f5d; 
        }

        /* Estilo específico para o campo de arquivo para não ficar feio */
        input[type="file"] {
            padding: 9px; /* O file já tem um botão dentro, precisa de menos padding */
            color: #9cb3a5;
        }

        /* Fazendo o campo de descrição ficar maior */
        textarea {
            resize: vertical; /* Deixa o cara puxar pra baixo se precisar escrever muito */
            min-height: 100px;
        }

        .btn-salvar { width: 100%; padding: 14px; background-color: #006341; color: white; border: 1px solid #008f5d; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-salvar:hover { background-color: #008f5d; }
        .btn-salvar:disabled { background-color: #2a4033; cursor: not-allowed; border-color: #1f3328; }
        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #008f5d; text-decoration: none; font-weight: bold; }
        .btn-voltar:hover { text-decoration: underline; color: #00b374; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Registrar Manutenção</h1>
    
    <form id="formManutencao" action="https://script.google.com/macros/s/AKfycbwsM5jmyNMFfLcr8mdnjl7buHGpk1SO4AaSJvf6Hd96uyksUDfdgT0xGGFlqL75IKur/exec" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="nome">Nome do Colaborador:</label>
            <input type="text" id="nome" name="Nome" required placeholder="Digite o nome completo">
        </div>
        
        <div class="form-group">
            <label for="ra">RA do Colaborador:</label>
            <input type="number" id="ra" name="RA" required placeholder="Ex: 12345">
        </div>
        
        <div class="form-group">
            <label for="data">Data da Manutenção:</label>
            <input type="date" id="data" name="Data" required>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição do Reparo (O que foi feito?):</label>
            <textarea id="descricao" name="Descricao" required placeholder="Ex: Troca do pino extrator da cavidade 4 que estava desgastado..."></textarea>
        </div>

        <div class="form-group">
            <label for="foto">Anexar Foto da Manutenção (Opcional):</label>
            <input type="file" id="foto" name="Foto" accept="image/png, image/jpeg">
        </div>

        <button type="submit" id="btnSubmit" class="btn-salvar">💾 Salvar Registro</button>
    </form>
    
    <a href="historico.html" class="btn-voltar">📋 Ver Histórico Completo</a>
</div>

<script>
    document.getElementById('formManutencao').addEventListener('submit', function(e) {
        e.preventDefault(); 
        const form = e.target;
        const btn = document.getElementById('btnSubmit');
        btn.innerText = 'Enviando... ⏳';
        btn.disabled = true;
        
        const data = new FormData(form);
        
        fetch(form.action, { method: 'POST', body: data, mode: 'no-cors' })
        .then(() => { window.location.href = 'historico.html'; })
        .catch(error => { alert('Erro na conexão!'); btn.innerText = '💾 Salvar Registro'; btn.disabled = false; });
    });
</script>
</body>
</html>
