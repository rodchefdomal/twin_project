<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Manutenção</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1410; color: #ffffff; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; font-size: 26px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-nova-manutencao { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background-color: #006341; color: white; text-decoration: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; margin: 0 auto 25px auto; transition: background 0.2s; border: 1px solid #008f5d; width: 100%; box-sizing: border-box; }
        .btn-nova-manutencao:hover { background-color: #008f5d; }
        .historico-box { background: #121e17; padding: 15px; border-radius: 8px; border: 1px solid #1f3328; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 25px; min-height: 100px; }
        .historico-item { padding: 12px; border-bottom: 1px solid #1f3328; font-size: 15px; color: #e0e0e0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .historico-item:last-child { border-bottom: none; }
        .historico-item strong { color: #28a745; }
        .tag-ra { background-color: #182b20; padding: 4px 8px; border-radius: 4px; font-size: 13px; color: #9cb3a5; border: 1px solid #1f3328; }
        .btn-voltar { color: #008f5d; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; justify-content: center; width: 100%; }
        .btn-voltar:hover { text-decoration: underline; color: #00b374; }
        .status-msg, .error-msg { text-align: center; padding: 20px; }
        .status-msg { color: #9cb3a5; font-style: italic; }
        .error-msg { color: #ff4a4a; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛠️ Histórico de Manutenção</h1>
    <a href="registrar.html" class="btn-nova-manutencao">➕ Registrar Nova Manutenção</a>
    <div class="historico-box" id="historico-lista">
        <div class="status-msg">Buscando dados na planilha do Google...</div>
    </div>
    <a href="index.html" class="btn-voltar">⬅️ Voltar ao Molde</a>
</div>
<script>
    // ID DA SUA PLANILHA JÁ CONFIGURADO AQUI:
    const SPREADSHEET_ID = '1ONDGleeC0pJW5_fTLpswa3FtpadrvcyE7v3rN-CXcpI'; 
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

    async function carregarHistorico() {
        const container = document.getElementById('historico-lista');
        
        if (SPREADSHEET_ID === 'COLOQUE_O_SEU_ID_AQUI_DE_NOVO') {
            container.innerHTML = `<div class="error-msg">Coloque o ID da Planilha no código!</div>`;
            return;
        }
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            // Retira a proteção do JSON
            const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const data = JSON.parse(jsonString);
            const rows = data.table.rows;
            container.innerHTML = ''; 
            
            // Ignora o cabeçalho
            let inicio = 0;
            const primeira = rows[0].c[0] ? String(rows[0].c[0].v).toLowerCase().trim() : '';
            if (primeira === 'nome') inicio = 1; 

            // Inverte para os mais novos aparecerem primeiro
            const registros = rows.slice(inicio).reverse();
            
            if (registros.length === 0) {
                container.innerHTML = '<div class="status-msg">Nenhum registro.</div>';
                return;
            }

            // Cria a lista na tela
            registros.forEach(row => {
                const nome = row.c[0] ? row.c[0].v : 'Sem Nome';
                const ra = row.c[1] ? row.c[1].v : 'S/RA';
                let dataCrua = row.c[2] ? row.c[2].v : 'Sem Data';
                
                let dataFormatada = dataCrua;
                if (dataCrua.toString().startsWith('Date')) {
                    const num = dataCrua.match(/\d+/g);
                    if (num && num.length >= 3) {
                        dataFormatada = `${String(num[2]).padStart(2, '0')}/${String(Number(num[1]) + 1).padStart(2, '0')}/${num[0]}`;
                    }
                }
                
                const div = document.createElement('div');
                div.className = 'historico-item';
                div.innerHTML = `<div><strong>${dataFormatada}</strong> — ${nome}</div><span class="tag-ra">RA: ${ra}</span>`;
                container.appendChild(div);
            });
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="error-msg">Erro ao carregar os dados. Verifique se a planilha está pública.</div>`;
        }
    }
    window.onload = carregarHistorico;
</script>
</body>
</html>
