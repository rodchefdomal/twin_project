<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Manutenção</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1410; color: #ffffff; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #121e17; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #1f3328; }
        h1 { text-align: center; font-size: 26px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #9cb3a5; font-size: 14px; }
        
        input[type="text"], input[type="date"], input[type="number"], textarea, input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #1f3328; 
            background-color: #182b20; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px; 
            font-family: inherit;
        }
        
        input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, textarea:focus { 
            outline: none; 
            border-color: #008f5d; 
        }

        input[type="file"] { padding: 9px; color: #9cb3a5; cursor: pointer; }
        textarea { resize: vertical; min-height: 100px; }

        .btn-salvar { width: 100%; padding: 14px; background-color: #006341; color: white; border: 1px solid #008f5d; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-salvar:hover { background-color: #006341; }
        .btn-salvar:disabled { background-color: #2a4033; cursor: not-allowed; border-color: #1f3328; color: #9cb3a5; }
        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #008f5d; text-decoration: none; font-weight: bold; }
        .btn-voltar:hover { text-decoration: underline; color: #00b374; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Registrar Manutenção</h1>
    
    <form id="formManutencao" action="https://script.google.com/macros/s/AKfycbyOa34vsNRk9tPiTJ-WliAv-0j-z62pFMrKgrmBNg5snovcHcnr3o5g2wRpX-XmmQ7F/exec" method="POST">
        
        <div class="form-group">
            <label for="nome">Nome do Colaborador:</label>
            <input type="text" id="nome" name="Nome" required placeholder="Digite o nome completo">
        </div>
        
        <div class="form-group">
            <label for="ra">RA do Colaborador:</label>
            <input type="number" id="ra" name="RA" required placeholder="Ex: 12345">
        </div>
        
        <div class="form-group">
            <label for="data">Data da Manutenção:</label>
            <input type="date" id="data" name="Data" required>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição do Reparo (O que foi feito?):</label>
            <textarea id="descricao" name="Descricao" required placeholder="Ex: Troca dos pinos extratores danificados..."></textarea>
        </div>

        <div class="form-group">
            <label for="foto">Anexar Foto da Manutenção (Opcional):</label>
            <input type="file" id="foto" accept="image/*, dummy/*">
        </div>

        <button type="submit" id="btnSubmit" class="btn-salvar">💾 Salvar Registro</button>
    </form>
    
    <a href="historico.html" class="btn-voltar">📋 Ver Histórico Completo</a>
</div>

<script>
    document.getElementById('formManutencao').addEventListener('submit', function(e) {
        e.preventDefault(); 
        const form = e.target;
        const btn = document.getElementById('btnSubmit');
        const fileInput = document.getElementById('foto');
        
        btn.innerText = 'Processando dados... ⏳';
        btn.disabled = true;
        
        const urlParams = new URLSearchParams();
        urlParams.append('Nome', form.Nome.value);
        urlParams.append('RA', form.RA.value);
        urlParams.append('Data', form.Data.value);
        urlParams.append('Descricao', form.Descricao.value);

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            
            // Função para comprimir a imagem antes de enviar!
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // Reduz a resolução para web
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Converte para JPEG com 70% de qualidade (fica super leve!)
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    const base64String = dataUrl.split(',')[1];
                    
                    urlParams.append('FotoData', base64String);
                    urlParams.append('FotoNome', file.name || "foto_manutencao.jpg");
                    urlParams.append('FotoMime', 'image/jpeg');
                    
                    enviarDados(form.action, urlParams, btn);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            enviarDados(form.action, urlParams, btn);
        }
    });

    function enviarDados(actionUrl, params, button) {
        button.innerText = 'Enviando para o sistema... 🚀';
        fetch(actionUrl, {
            method: 'POST',
            body: params.toString(),
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        })
        .then(() => { 
            window.location.href = 'historico.html'; 
        })
        .catch(error => { 
            alert('Ops! Erro na conexão ao salvar. Tente novamente.'); 
            button.innerText = '💾 Salvar Registro'; 
            button.disabled = false; 
        });
    }
</script>
</body>
</html>
