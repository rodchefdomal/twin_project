<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Manutenção</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 400px; margin: 0 auto; }
        .btn-registrar { background-color: #28a745; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn-registrar:hover { background-color: #218838; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background-color: #333; color: white; box-sizing: border-box; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .btn-voltar { display: block; text-align: center; color: #007bff; text-decoration: none; margin-top: 15px; font-weight: bold; }
        .btn-voltar:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <!-- COLOQUE SEU LINK DO APPS SCRIPT NO ACTION ABAIXO -->
        <form id="meuFormulario" action="https://script.google.com/macros/s/AKfycbwsM5jmyNMFfLcr8mdnjl7buHGpk1SO4AaSJvf6Hd96uyksUDfdgT0xGGFlqL75IKur/exec" method="POST">
            
            <label>Nome do Colaborador:</label>
            <input type="text" name="Nome" placeholder="Digite seu nome completo" required>

            <label>RA (Matrícula):</label>
            <input type="text" name="RA" placeholder="Ex: 12345" required>

            <label>Data da Manutenção:</label>
            <input type="date" name="Data" required>

            <button type="submit" class="btn-registrar">💾 Salvar Registro</button>
            <a href="historico.html" class="btn-voltar">📋 Ver Histórico</a>
        </form>
    </div>

    <script>
        const form = document.getElementById("meuFormulario");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const btn = form.querySelector('.btn-registrar');
            btn.disabled = true;
            btn.textContent = "Salvando...";

            try {
                const formData = new FormData(form);
                const urlEncoded = new URLSearchParams(formData);

                const response = await fetch(form.action, {
                    method: "POST",
                    body: urlEncoded,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                
                const result = await response.json();
                if (result.result === "success") {
                    alert("Sucesso! Registro salvo na planilha.");
                    form.reset();
                } else {
                    alert("Erro ao salvar: " + result.error);
                }
            } catch (error) {
                alert("Sucesso! Registro enviado.");
                form.reset();
            } finally {
                btn.disabled = false;
                btn.textContent = "💾 Salvar Registro";
            }
        });
    </script>

</body>
</html>
