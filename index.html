<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gêmeo Digital - Molde Industrial</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabeçalho topo de linha */
        header {
            width: 100%;
            background-color: #1e1e1e;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #007bff;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2);
            margin-bottom: 30px;
        }
        
        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
        }

        header span {
            color: #007bff;
        }

        .dashboard {
            display: flex;
            flex-direction: column; /* Deixa o 3D em cima e o painel embaixo */
            gap: 20px;
            max-width: 1200px;
            width: 90%;
            align-items: center;
        }

        /* O palco onde o 3D vai brilhar - Agora mais largo! */
        .viewer-container {
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            height: 500px; /* Altura maior pra destacar a peça */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        /* Tag provisória até o 3D chegar */
        .viewer-container::before {
            content: 'Área do Modelo 3D';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            font-weight: bold;
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            z-index: 1;
            outline: none;
        }

        /* Painel Inferior de Controle Esticado */
        .control-panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            display: flex;
            flex-direction: row; /* Deita os itens lado a lado */
            justify-content: space-between;
            align-items: stretch;
            gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .status-card {
            flex: 1; /* Faz ocupar espaço igual aos botões */
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid #28a745;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-card h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #aaa;
        }

        .status-card p {
            margin: 0;
            font-size: 22px;
            font-weight: bold;
            color: #28a745;
        }

        /* Botões do Menu */
        .btn {
            flex: 1; /* Faz ocupar espaço igual ao status */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .btn-registro {
            background-color: #007bff;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .btn-registro:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .btn-historico {
            background-color: #6c757d;
            box-shadow: 0 4px 10px rgba(108, 117, 125, 0.3);
        }

        .btn-historico:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
        }

        /* Inteligência para celular: se a tela for pequena, empilha de novo */
        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
            }
            .viewer-container {
                height: 350px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Gêmeo <span>Digital</span></h1>
    </header>

    <div class="dashboard">
        
        <div class="viewer-container">
            <model-viewer 
                alt="Modelo 3D do Molde" 
                auto-rotate 
                camera-controls 
                shadow-intensity="1">
            </model-viewer>
        </div>

        <div class="control-panel">
            
            <div class="status-card">
                <h3>Status Atual do Molde</h3>
                <p>⚙️ Operacional</p>
            </div>

            <a href="registrar.html" class="btn btn-registro">➕ Registrar Manutenção</a>
            
            <a href="historico.html" class="btn btn-historico">📋 Histórico Completo</a>

        </div>

    </div>

</body>
</html>
