<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Manutenção</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1410; color: #ffffff; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        h1 { font-size: 26px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; text-align: center; }
        
        .btn-novo { display: block; width: 100%; max-width: 600px; padding: 15px; background-color: #006341; color: white; border: 1px solid #008f5d; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; text-decoration: none; margin-bottom: 20px; transition: background 0.2s; box-sizing: border-box; }
        .btn-novo:hover { background-color: #008f5d; }
        
        .historico-container { width: 100%; max-width: 600px; background: #121e17; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #1f3328; box-sizing: border-box; }
        
        .registro-card { background-color: #182b20; border: 1px solid #1f3328; border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: transform 0.2s, background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .registro-card:hover { transform: translateY(-2px); background-color: #1c3325; border-color: #008f5d; }
        
        .registro-info { display: flex; flex-direction: column; gap: 5px; }
        .registro-data { font-weight: bold; color: #28a745; font-size: 14px; }
        .registro-nome { font-size: 16px; font-weight: 500; }
        .registro-ra { font-size: 12px; color: #9cb3a5; background: #0d1410; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        
        .loading { text-align: center; color: #9cb3a5; padding: 20px; font-weight: bold; font-size: 18px; }
        
        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #008f5d; text-decoration: none; font-weight: bold; }
        
        /* Estilos do Modal (Tela de Detalhes) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #121e17; border: 1px solid #1f3328; border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-content h2 { margin-top: 0; color: #28a745; font-size: 22px; border-bottom: 1px solid #1f3328; padding-bottom: 10px; }
        .modal-detalhe { margin-bottom: 15px; }
        .modal-detalhe strong { color: #9cb3a5; display: block; font-size: 14px; margin-bottom: 3px; }
        .modal-detalhe p { margin: 0; font-size: 16px; background: #182b20; padding: 12px; border-radius: 8px; border: 1px solid #1f3328; line-height: 1.5; }
        .modal-foto { width: 100%; border-radius: 8px; border: 2px solid #1f3328; margin-top: 10px; display: none; }
        .btn-fechar { display: block; width: 100%; padding: 15px; background-color: #4a6355; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-fechar:hover { background-color: #3b5044; }
    </style>
</head>
<body>

    <h1>🛠️ Histórico de Manutenção
