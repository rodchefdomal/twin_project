<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Manutenção</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 400px; margin: 0 auto; }
        .btn-registrar { background-color: #007bff; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn-registrar:hover { background-color: #0056b3; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background-color: #333; color: white; box-sizing: border-box; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body>

    <div class="card">
        <form action="https://formspree.io/f/xvzjkyyo" method="POST">
            
            <label>Nome do Colaborador:</label>
            <input type="text" name="Nome" placeholder="Digite seu nome completo" required>

            <label>RA (Matrícula):</label>
            <input type="text" name="RA" placeholder="Ex: 12345" required>

            <label>Data da Manutenção:</label>
            <input type="date" name="Data" required>

            <button type="submit" class="btn-registrar">💾 Salvar Registro</button>
            
        </form> </div>

</body>
</html>
